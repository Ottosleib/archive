---
# generic page layout
layout: default
---
<div class="container my-4 my-md-5">
  <section class="editorial-section">
    {% if page.title and page.permalink != "/" %}
    <p class="editorial-kicker mb-2">Collection Page</p>
    <h1 class="h2 mb-4">{{ page.title }}</h1>
    {% endif %}
    {{ content }}
  </section>
</div>
